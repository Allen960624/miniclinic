<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; }
        h1 { color: #0F2443; text-align: center; }
        .field { margin: 16px 0; }
        label { display: block; font-weight: bold; color: #0F2443; margin-bottom: 6px; }
        input { width: 100%; padding: 10px; border: 1px solid #E2E8F0; border-radius: 4px; box-sizing: border-box; }
        .error { color: #DC2626; font-size: 13px; margin-top: 4px; }
        .success { background: #D1FAE5; color: #065F46; padding: 12px; border-radius: 4px; margin-bottom: 16px; text-align: center; }
        button { width: 100%; background: #14B8A6; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0D9488; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #64748B; text-decoration: none; }
    </style>
</head>
<body>
    <h1>修改密碼</h1>

    <div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <form th:action="@{/password}" th:object="${passwordForm}" method="post">
        <div class="field">
            <label>舊密碼</label>
            <input type="password" th:field="*{oldPassword}">
            <div class="error" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
        </div>

        <div class="field">
            <label>新密碼 (至少 8 碼)</label>
            <input type="password" th:field="*{newPassword}">
            <div class="error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>

        <div class="field">
            <label>確認新密碼</label>
            <input type="password" th:field="*{confirmPassword}">
            <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>

        <button type="submit">確認修改</button>
    </form>

    <a th:href="@{/dashboard}" class="back-link">← 返回儀表板</a>
</body>
</html>
